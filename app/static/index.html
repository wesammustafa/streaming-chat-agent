<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Streaming Chat Agent</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --border: #e1e4e8;
      --text: #1f2328;
      --muted: #6a737d;
      --accent: #2563eb;
      --danger: #b91c1c;
      --ok: #15803d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      height: 100dvh;
    }
    main {
      width: min(680px, 100%);
      display: flex;
      flex-direction: column;
      padding: 16px;
      gap: 12px;
    }
    header h1 { font-size: 1.1rem; margin: 0; }
    header p { margin: 4px 0 0; color: var(--muted); font-size: 0.85rem; }
    #messages {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 4px;
    }
    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .user { align-self: flex-end; background: var(--accent); color: #fff; border: none; }
    .assistant { align-self: flex-start; }
    .bubble.error-bubble { border-color: var(--danger); color: var(--danger); }
    .tool-status {
      display: none;
      font-size: 0.75rem;
      margin-bottom: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid var(--border);
      color: var(--muted);
      width: fit-content;
    }
    .tool-status.running { display: inline-block; border-color: var(--accent); color: var(--accent); }
    .tool-status.ok { display: inline-block; border-color: var(--ok); color: var(--ok); }
    .tool-status.failed { display: inline-block; border-color: var(--danger); color: var(--danger); }
    form { display: flex; gap: 8px; }
    input {
      flex: 1;
      padding: 10px 14px;
      border-radius: 10px;
      border: 1px solid #d0d7de;
      font-size: 1rem;
      background: var(--surface);
    }
    input:disabled, button:disabled { opacity: 0.6; }
    button {
      padding: 10px 18px;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-size: 1rem;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Streaming Chat Agent</h1>
      <p>Try: "what is (10 - 4) * 2?" or "1 / 0"</p>
    </header>
    <div id="messages" aria-live="polite"></div>
    <form id="chat-form">
      <input id="chat-input" placeholder="Message the assistant" autocomplete="off" maxlength="4000" />
      <button id="send-button" type="submit">Send</button>
    </form>
  </main>
  <script src="/app.js"></script>
</body>
</html>
