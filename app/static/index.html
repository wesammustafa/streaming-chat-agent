<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Streaming Chat Agent</title>
  <style>
    :root {
      --bg: #f9f9f7;
      --surface: #ffffff;
      --ink: #1b1f23;
      --muted: #66707a;
      --line: #e4e2dc;
      --accent: #0e6e5f;
      --accent-soft: #e7f1ee;
      --user-bubble: #efeee9;
      --ok: #1d7a4f;
      --danger: #b3362c;
      --danger-soft: #fbedea;
      --mono: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace;
      color-scheme: light;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI Variable",
        "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      font-size: 15px;
      line-height: 1.6;
      color: var(--ink);
      background: var(--bg);
    }
    .app { height: 100dvh; display: flex; flex-direction: column; }

    .topbar {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      border-bottom: 1px solid var(--line);
      background: color-mix(in srgb, var(--bg) 88%, transparent);
      backdrop-filter: blur(8px);
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand-mark {
      width: 28px; height: 28px;
      display: grid; place-items: center;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .brand h1 { font-size: 14px; font-weight: 600; margin: 0; letter-spacing: -0.01em; }
    .brand p { font-size: 12px; color: var(--muted); margin: 0; }

    main {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      scroll-padding-bottom: 24px;
    }
    .column {
      max-width: 720px;
      margin: 0 auto;
      padding: 28px 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    #empty-state {
      margin: 12vh auto 0;
      text-align: center;
      max-width: 420px;
    }
    #empty-state .empty-mark {
      width: 44px; height: 44px;
      margin: 0 auto 14px;
      display: grid; place-items: center;
      border-radius: 12px;
      background: var(--accent-soft);
      color: var(--accent);
    }
    #empty-state h2 { font-size: 22px; font-weight: 650; letter-spacing: -0.02em; margin: 0 0 6px; }
    #empty-state p { color: var(--muted); margin: 0 0 18px; font-size: 14px; }
    .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .chip {
      font: inherit;
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--ink);
      cursor: pointer;
      transition: border-color 120ms ease, background 120ms ease;
    }
    .chip:hover { border-color: var(--accent); background: var(--accent-soft); }

    .msg { display: flex; gap: 12px; animation: rise 240ms ease both; }
    .msg.user { justify-content: flex-end; }
    .avatar {
      flex: none;
      width: 28px; height: 28px;
      margin-top: 2px;
      display: grid; place-items: center;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
    }
    .msg-body { min-width: 0; max-width: 100%; }
    .msg-text {
      white-space: pre-wrap;
      overflow-wrap: anywhere;
    }
    .msg.user .msg-text {
      background: var(--user-bubble);
      padding: 10px 16px;
      border-radius: 18px;
      border-bottom-right-radius: 6px;
      max-width: 560px;
    }
    .msg-text.streaming:not(:empty)::after,
    .msg-text.streaming:empty::before {
      content: "\258D";
      color: var(--accent);
      animation: blink 1s steps(2, start) infinite;
    }
    .msg-text.reply-error { color: var(--danger); }

    .tool-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      padding: 5px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: var(--surface);
      font-size: 12.5px;
      color: var(--muted);
    }
    .tool-chip[hidden] { display: none; }
    .tool-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); }
    .tool-chip.running .dot { background: var(--accent); animation: pulse 1.1s ease-in-out infinite; }
    .tool-chip.ok .dot { background: var(--ok); }
    .tool-chip.failed .dot { background: var(--danger); }
    .tool-chip.failed { border-color: color-mix(in srgb, var(--danger) 35%, var(--line)); background: var(--danger-soft); color: var(--danger); }
    .tool-chip code { font-family: var(--mono); font-size: 12px; color: var(--ink); }
    .tool-chip.failed code { color: var(--danger); }

    .composer-wrap {
      padding: 8px 20px calc(14px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg) 65%, transparent);
    }
    .composer {
      max-width: 720px;
      margin: 0 auto;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 8px 8px 8px 18px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 26px;
      box-shadow: 0 2px 12px rgba(27, 31, 35, 0.05);
      transition: border-color 120ms ease, box-shadow 120ms ease;
    }
    .composer:focus-within {
      border-color: var(--accent);
      box-shadow: 0 2px 14px rgba(14, 110, 95, 0.12);
    }
    textarea {
      flex: 1;
      font: inherit;
      color: inherit;
      background: none;
      border: none;
      resize: none;
      padding: 6px 0;
      max-height: 168px;
      outline: none;
    }
    textarea::placeholder { color: var(--muted); }
    #send-button {
      flex: none;
      width: 36px; height: 36px;
      display: grid; place-items: center;
      border: none;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      transition: background 120ms ease, transform 120ms ease;
    }
    #send-button:hover { background: #0b5a4e; }
    #send-button:active { transform: scale(0.94); }
    #send-button .icon-stop { display: none; }
    #send-button.stop .icon-send { display: none; }
    #send-button.stop .icon-stop { display: block; }
    textarea:disabled { color: var(--muted); }
    .composer-hint {
      max-width: 720px;
      margin: 8px auto 0;
      text-align: center;
      font-size: 12px;
      color: var(--muted);
    }

    :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    #send-button:focus-visible, .chip:focus-visible { outline-offset: 3px; }
    /* The composer pill's focus-within ring covers the textarea's own outline. */
    textarea:focus-visible { outline: none; }

    @keyframes blink { 50% { opacity: 0; } }
    @keyframes pulse { 50% { opacity: 0.35; } }
    @keyframes rise { from { opacity: 0; transform: translateY(6px); } }
    @media (prefers-reduced-motion: reduce) {
      .msg { animation: none; }
      .tool-chip.running .dot, .msg-text.streaming::after, .msg-text.streaming::before { animation: none; }
    }
    @media (max-width: 640px) {
      .column { padding: 20px 14px 12px; }
      .msg.user .msg-text { max-width: 85%; }
      .composer-wrap { padding-left: 12px; padding-right: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <span class="brand-mark" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path fill-rule="evenodd" d="M4.25 1h7.5A3.25 3.25 0 0 1 15 4.25v4a3.25 3.25 0 0 1-3.25 3.25H8l-3.5 3v-3h-.25A3.25 3.25 0 0 1 1 8.25v-4A3.25 3.25 0 0 1 4.25 1zM5 5.1a1.15 1.15 0 1 0 0 2.3 1.15 1.15 0 1 0 0-2.3zm3 0a1.15 1.15 0 1 0 0 2.3 1.15 1.15 0 1 0 0-2.3zm3 0a1.15 1.15 0 1 0 0 2.3 1.15 1.15 0 1 0 0-2.3z"/>
          </svg>
        </span>
        <div>
          <h1>Streaming Chat Agent</h1>
          <p>Answers arrive as they're written</p>
        </div>
      </div>
    </header>

    <main id="messages">
      <div class="column" id="column" aria-live="polite">
        <section id="empty-state">
          <div class="empty-mark" aria-hidden="true">
            <svg width="22" height="22" viewBox="0 0 16 16" fill="currentColor">
              <path fill-rule="evenodd" d="M4.25 1h7.5A3.25 3.25 0 0 1 15 4.25v4a3.25 3.25 0 0 1-3.25 3.25H8l-3.5 3v-3h-.25A3.25 3.25 0 0 1 1 8.25v-4A3.25 3.25 0 0 1 4.25 1zM5 5.1a1.15 1.15 0 1 0 0 2.3 1.15 1.15 0 1 0 0-2.3zm3 0a1.15 1.15 0 1 0 0 2.3 1.15 1.15 0 1 0 0-2.3zm3 0a1.15 1.15 0 1 0 0 2.3 1.15 1.15 0 1 0 0-2.3z"/>
            </svg>
          </div>
          <h2>How can I help?</h2>
          <p>Ask anything. Arithmetic runs through a real tool and the answer streams in live.</p>
          <div class="suggestions">
            <button class="chip" type="button">what is (10 - 4) * 2?</button>
            <button class="chip" type="button">1 / 0</button>
            <button class="chip" type="button">hola!</button>
          </div>
        </section>
      </div>
    </main>

    <footer class="composer-wrap">
      <form id="chat-form" class="composer">
        <textarea id="chat-input" rows="1" dir="auto" placeholder="Message the assistant" maxlength="4000" autocomplete="off"></textarea>
        <button id="send-button" type="submit" aria-label="Send message">
          <svg class="icon-send" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M8 13V3m0 0L3.5 7.5M8 3l4.5 4.5"/>
          </svg>
          <svg class="icon-stop" width="10" height="10" viewBox="0 0 10 10" fill="currentColor" aria-hidden="true">
            <rect width="10" height="10" rx="2"/>
          </svg>
        </button>
      </form>
      <p class="composer-hint">Enter to send, Shift+Enter for a new line</p>
    </footer>
  </div>
  <script src="/app.js"></script>
</body>
</html>
